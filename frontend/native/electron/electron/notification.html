<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    .notification-container {
      width: 380px;
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.94) 0%, rgba(10, 14, 39, 0.94) 100%);
      backdrop-filter: blur(18px);
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45),
                  0 0 0 1px rgba(255, 255, 255, 0.08),
                  inset 0 1px 0 rgba(255, 255, 255, 0.06);
      padding: 10px 12px;
      cursor: pointer;
      animation: slideIn 0.3s ease-out;
      position: relative;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      .notification-container {
        background: linear-gradient(135deg, rgba(28, 28, 30, 0.98) 0%, rgba(20, 20, 22, 0.98) 100%);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.12),
                    inset 0 1px 2px rgba(255, 255, 255, 0.08);
      }
    }

    @keyframes slideIn {
      from {
        transform: translateX(420px) scale(0.9);
        opacity: 0;
      }
      to {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
      to {
        transform: translateX(420px) scale(0.9);
        opacity: 0;
      }
    }

    .notification-content {
      display: flex;
      gap: 9px;
      align-items: flex-start;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.26) 0%, rgba(30, 64, 175, 0.36) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35),
                  0 0 0 1px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .text-content {
      flex: 1;
      min-width: 0;
    }

    .notification-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .sender-name {
      font-weight: 700;
      font-size: 14px;
      color: #f8fafc;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    @media (prefers-color-scheme: dark) {
      .sender-name {
        color: #f5f5f7;
      }
    }

    .timestamp {
      font-size: 10px;
      color: rgba(226, 232, 240, 0.68);
      white-space: nowrap;
    }

    @media (prefers-color-scheme: dark) {
      .timestamp {
        color: #999999;
      }
    }

    .chat-name {
      font-size: 12px;
      color: #fbbf24;
      margin-bottom: 3px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kind-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: rgba(241, 90, 34, 0.2);
      color: #fdba74;
      width: fit-content;
    }

    .kind-pill[data-kind="task"] {
      background: rgba(59, 130, 246, 0.14);
      color: #2563eb;
    }

    .kind-pill[data-kind="event"] {
      background: rgba(139, 92, 246, 0.14);
      color: #7c3aed;
    }

    .kind-pill[data-kind="system"] {
      background: rgba(107, 114, 128, 0.14);
      color: #4b5563;
    }

    @media (prefers-color-scheme: dark) {
      .kind-pill[data-kind="task"] {
        color: #60a5fa;
      }

      .kind-pill[data-kind="event"] {
        color: #c084fc;
      }

      .kind-pill[data-kind="system"] {
        color: #d1d5db;
      }
    }

    .message-text {
      font-size: 12px;
      line-height: 1.25;
      color: rgba(226, 232, 240, 0.92);
      display: -webkit-box;
      line-clamp: 4;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-weight: 400;
    }

    @media (prefers-color-scheme: dark) {
      .message-text {
        color: #e0e0e0;
      }
    }

    .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #ff3b30;
      color: white;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 5px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(255, 59, 48, 0.4);
      min-width: 18px;
      text-align: center;
    }

    .close-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.06);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
    }

    .avatar-icon {
      width: 18px;
      height: 18px;
      display: block;
      color: #60a5fa;
      opacity: 0.95;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
    }

    .close-btn:active {
      transform: scale(0.95);
    }

    @media (prefers-color-scheme: dark) {
      .close-btn {
        background: rgba(255, 255, 255, 0.1);
        color: #ccc;
      }
      
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    }
  </style>
</head>
<body>
  <div class="notification-container" id="notification">
    <button class="close-btn" id="closeBtn" title="Закрыть">×</button>
    <div class="notification-content">
      <div class="avatar" id="avatar">
        <span id="avatarText"></span>
      </div>
      <div class="text-content">
        <div class="kind-pill" id="kindPill" style="display: none;"></div>
        <div class="notification-header">
          <div class="sender-name" id="senderName"></div>
          <div class="timestamp" id="timestamp"></div>
        </div>
        <div class="chat-name" id="chatName" style="display: none;"></div>
        <div class="message-text" id="messageText"></div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // Получаем данные уведомления
    ipcRenderer.on('notification-data', (event, data) => {
      const {
        title,
        subtitle,
        senderName,
        chatName,
        message,
        avatar,
        timestamp,
        badge,
        chatId,
        url,
        kind
      } = data;

      const genericLabels = new Set([
        'новое сообщение',
        'тестовое уведомление',
        'новое событие',
        'событие обновлено',
        'напоминание о событии',
        'уведомление'
      ]);

      const normalizedSender = String(senderName || '').trim();
      const normalizedChatName = String(chatName || '').trim();
      const normalizedSubtitle = String(subtitle || '').trim();
      const normalizedTitle = String(title || '').trim();

      const isGenericSender = normalizedSender && genericLabels.has(normalizedSender.toLowerCase());
      const senderCandidate = !isGenericSender ? normalizedSender : '';

      const resolvedTitle = senderCandidate
        || normalizedChatName
        || normalizedSubtitle
        || normalizedSender
        || normalizedTitle
        || 'Новое уведомление';

      const resolvedSubtitle = [normalizedChatName, normalizedSubtitle, normalizedTitle, normalizedSender]
        .find((value) => value && value !== resolvedTitle) || '';
      const resolvedMessage = message || 'Откройте приложение, чтобы посмотреть детали';

      // Устанавливаем имя отправителя
      document.getElementById('senderName').textContent = resolvedTitle;

      const kindPillEl = document.getElementById('kindPill');
      if (kind) {
        kindPillEl.textContent = kind === 'task' ? 'Задача' : kind === 'event' ? 'Событие' : kind === 'system' ? 'Система' : 'Сообщение';
        kindPillEl.dataset.kind = kind;
        kindPillEl.style.display = 'inline-flex';
      }

      // Устанавливаем название чата (если групповой)
      const chatNameEl = document.getElementById('chatName');
      chatNameEl.style.display = 'none';
      chatNameEl.textContent = '';

      if (resolvedSubtitle && resolvedSubtitle !== resolvedTitle) {
        chatNameEl.textContent = resolvedSubtitle;
        chatNameEl.style.display = 'block';
      }

      // Устанавливаем текст сообщения
      document.getElementById('messageText').textContent = resolvedMessage;

      // Устанавливаем время
      const timeString = timestamp ? formatTime(timestamp) : 'только что';
      document.getElementById('timestamp').textContent = timeString;

      // Устанавливаем аватар
      const avatarEl = document.getElementById('avatar');
      const avatarTextEl = document.getElementById('avatarText');
      avatarEl.querySelectorAll('img, .badge').forEach((node) => node.remove());
      avatarTextEl.textContent = '';
      
      if (avatar && avatar.startsWith('http')) {
        const img = document.createElement('img');
        img.src = avatar;
        img.onerror = () => {
          avatarTextEl.innerHTML = getBellSvg();
        };
        avatarEl.appendChild(img);
      } else {
        avatarTextEl.innerHTML = getBellSvg();
      }

      // Устанавливаем бейдж (если есть)
      if (badge && badge > 0) {
        const badgeEl = document.createElement('div');
        badgeEl.className = 'badge';
        badgeEl.textContent = badge > 99 ? '99+' : badge;
        avatarEl.style.position = 'relative';
        avatarEl.appendChild(badgeEl);
      }

      // Клик по уведомлению - открываем чат
      document.getElementById('notification').addEventListener('click', (e) => {
        if (!e.target.closest('#closeBtn')) {
          ipcRenderer.send('notification-click', { chatId, url });
        }
      });

      // Кнопка закрытия
      document.getElementById('closeBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        ipcRenderer.send('notification-close');
      });

      // Уведомление будет висеть пока его не закроют вручную
    });

    function getBellSvg() {
      return '<svg class="avatar-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><path d="M10 17a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;

      if (diff < 60000) return 'только что';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
      
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    // Предотвращаем выделение текста
    document.addEventListener('selectstart', (e) => e.preventDefault());
  </script>
</body>
</html>
