<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр фото</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: no-drag;
      user-select: none;
      -webkit-user-select: none;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: rgba(0, 0, 0, 0.95);
    }

    #img {
      max-width: calc(100vw - 100px);
      max-height: calc(100vh - 80px);
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
      transition: opacity 0.18s ease;
      -webkit-app-region: drag;
      cursor: grab;
    }
    #img:active { cursor: grabbing; }

    /* Navigation arrows */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.88);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
    }
    #viewer:hover .nav-btn:not(:disabled) { opacity: 1; }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.22); }
    .nav-btn:disabled { opacity: 0 !important; cursor: default; pointer-events: none; }
    #nav-prev { left: 16px; }
    #nav-next { right: 16px; }

    /* Top controls */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
      -webkit-app-region: drag;
    }
    #viewer:hover .top-bar { opacity: 1; }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
      margin-left: auto;
    }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.2); color: white; }
    #close-btn:hover { background: rgba(239, 68, 68, 0.8); border-color: transparent; }

    /* Bottom info bar */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    #viewer:hover .bottom-bar { opacity: 1; }

    #counter {
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      padding: 4px 14px;
      border-radius: 99px;
      backdrop-filter: blur(8px);
    }

    #filename {
      position: absolute;
      bottom: 56px; left: 0; right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #viewer:hover #filename { opacity: 1; }

    /* Thumbnails strip (for multiple images) */
    .thumb-strip {
      position: absolute;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      padding: 6px;
      border-radius: 12px;
      max-width: 80vw;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }

    .thumb {
      width: 40px; height: 40px;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.5;
      border: 2px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .thumb:hover { opacity: 0.8; }
    .thumb.active { opacity: 1; border-color: white; }

    svg { display: block; }
  </style>
</head>
<body>
<div id="viewer">
  <!-- Top bar -->
  <div class="top-bar">
    <div></div>
    <div class="top-controls">
      <button class="icon-btn" id="zoom-in-btn" title="Увеличить">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="icon-btn" id="zoom-out-btn" title="Уменьшить">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="icon-btn" id="download-btn" title="Скачать">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="close-btn" title="Закрыть (Esc)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main image -->
  <img id="img" src="" alt="Preview"/>

  <!-- Nav arrows -->
  <button class="nav-btn" id="nav-prev" title="Назад (←)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="nav-btn" id="nav-next" title="Вперёд (→)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

  <!-- Filename -->
  <div id="filename"></div>

  <!-- Bottom: counter or thumbs -->
  <div id="thumb-strip-wrap"></div>
  <div class="bottom-bar">
    <div id="counter"></div>
  </div>
</div>

<script>
  const { ipcRenderer, shell } = require('electron');

  let urls = [];
  let names = [];
  let currentIndex = 0;
  let zoomScale = 1;

  const imgEl = document.getElementById('img');

  function show(index, crossfade = true) {
    currentIndex = index;
    const url = urls[index];
    const name = names[index] || url.split('/').pop() || '';

    if (crossfade) {
      imgEl.style.opacity = '0';
      setTimeout(() => {
        imgEl.src = url;
        zoomScale = 1;
        imgEl.style.transform = '';
        imgEl.style.opacity = '1';
      }, 120);
    } else {
      imgEl.src = url;
    }

    document.getElementById('filename').textContent = name;
    document.getElementById('nav-prev').disabled = (index === 0);
    document.getElementById('nav-next').disabled = (index === urls.length - 1);

    // Counter
    const counter = document.getElementById('counter');
    if (urls.length > 1) {
      counter.textContent = `${index + 1} / ${urls.length}`;
    } else {
      counter.textContent = '';
    }

    // Update thumb strip
    document.querySelectorAll('.thumb').forEach((t, i) => {
      t.classList.toggle('active', i === index);
    });
  }

  function buildThumbStrip() {
    const wrap = document.getElementById('thumb-strip-wrap');
    wrap.innerHTML = '';
    if (urls.length <= 1) return;

    const strip = document.createElement('div');
    strip.className = 'thumb-strip';
    urls.forEach((url, i) => {
      const img = document.createElement('img');
      img.className = 'thumb' + (i === currentIndex ? ' active' : '');
      img.src = url;
      img.onclick = () => show(i);
      strip.appendChild(img);
    });
    wrap.appendChild(strip);
  }

  ipcRenderer.on('photo-data', (_, data) => {
    urls  = Array.isArray(data.urls)  ? data.urls  : [data.url];
    names = Array.isArray(data.names) ? data.names : [];

    // Show nav buttons only when multiple
    if (urls.length <= 1) {
      document.getElementById('nav-prev').style.display = 'none';
      document.getElementById('nav-next').style.display = 'none';
    } else {
      document.getElementById('nav-prev').style.display = '';
      document.getElementById('nav-next').style.display = '';
    }

    currentIndex = Math.max(0, urls.indexOf(data.url));
    buildThumbStrip();
    show(currentIndex, false);
  });

  // Navigation
  document.getElementById('nav-prev').onclick = () => {
    if (currentIndex > 0) show(currentIndex - 1);
  };
  document.getElementById('nav-next').onclick = () => {
    if (currentIndex < urls.length - 1) show(currentIndex + 1);
  };

  // Close
  document.getElementById('close-btn').onclick = () => window.close();

  // Zoom
  document.getElementById('zoom-in-btn').onclick = () => {
    zoomScale = Math.min(zoomScale + 0.25, 4);
    imgEl.style.transform = `scale(${zoomScale})`;
    imgEl.style.cursor = zoomScale > 1 ? 'zoom-out' : 'grab';
  };
  document.getElementById('zoom-out-btn').onclick = () => {
    zoomScale = Math.max(zoomScale - 0.25, 0.25);
    imgEl.style.transform = `scale(${zoomScale})`;
    imgEl.style.cursor = zoomScale > 1 ? 'zoom-out' : 'grab';
  };

  // Download
  document.getElementById('download-btn').onclick = () => {
    const url = urls[currentIndex];
    if (url) shell.openExternal(url);
  };

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape')      { window.close(); return; }
    if (e.key === 'ArrowLeft'  && currentIndex > 0) { show(currentIndex - 1); return; }
    if (e.key === 'ArrowRight' && currentIndex < urls.length - 1) { show(currentIndex + 1); return; }
    if (e.key === '+' || e.key === '=') { zoomScale = Math.min(zoomScale + 0.25, 4); imgEl.style.transform = `scale(${zoomScale})`; }
    if (e.key === '-')                  { zoomScale = Math.max(zoomScale - 0.25, 0.25); imgEl.style.transform = `scale(${zoomScale})`; }
    if (e.key === '0')                  { zoomScale = 1; imgEl.style.transform = ''; }
  });

  // Click image to zoom / reset
  imgEl.addEventListener('click', (e) => {
    if (zoomScale !== 1) { zoomScale = 1; imgEl.style.transform = ''; return; }
    zoomScale = 2;
    imgEl.style.transform = `scale(2)`;
  });
</script>
</body>
</html>
