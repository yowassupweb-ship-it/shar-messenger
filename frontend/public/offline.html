<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shar OS - Offline</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1f2937 0%, #0b1220 45%, #020617 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 460px;
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
      padding: 20px;
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #f8fafc;
    }
    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Нет подключения к сети</h1>
    <p>
      Shar OS попробует восстановить соединение автоматически. Как только сеть вернется,
      обновите страницу и продолжайте работу.
    </p>
  </main>
</body>
</html>
