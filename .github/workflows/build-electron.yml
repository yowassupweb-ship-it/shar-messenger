name: Build & Deploy Electron

on:
  push:
    branches: [main]
    paths:
      - 'frontend/native/electron/**'
      - '.github/workflows/build-electron.yml'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/native/electron/package-lock.json

      - name: Install dependencies
        working-directory: frontend/native/electron
        run: npm ci

      - name: Bump patch version
        working-directory: frontend/native/electron
        run: npm version patch --no-git-tag-version

      - name: Build Electron (Windows NSIS web)
        working-directory: frontend/native/electron
        run: npm run build:win

      - name: Upload installer to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: |
            frontend/native/electron/release/latest.yml,
            frontend/native/electron/release/Shar setup.exe,
            frontend/native/electron/release/Shar setup.exe.blockmap,
            frontend/native/electron/release/nsis-web/*.7z
          target: /var/www/shar/updates/
          strip_components: 4

      - name: Set file permissions on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: chmod -R 644 /var/www/shar/updates/* && chmod 755 /var/www/shar/updates/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-installer
          path: |
            frontend/native/electron/release/latest.yml
            frontend/native/electron/release/Shar setup.exe
          retention-days: 30
